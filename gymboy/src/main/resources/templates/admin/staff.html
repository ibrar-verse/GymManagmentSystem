<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Staff - GymBoy</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="navbar">
    <a href="/" class="navbar-brand">💪 GymBoy (Admin)</a>
    <ul class="navbar-menu">
        <li><a href="/admin/dashboard">Dashboard</a></li>
        <li><a href="/admin/staff">Staff</a></li>
    </ul>
    <a class="btn-logout" href="/admin/logout">Logout</a>
</nav>

<div class="page-container">
    <h1 class="page-title">Staff</h1>
    <div class="table-container" style="margin-bottom: 2rem;">
        <h2 style="margin-bottom: 1rem;">Add Staff Member</h2>
        <form th:action="@{/admin/staff/add}" method="post" enctype="multipart/form-data" style="display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));">
            <div>
                <label for="firstName">First Name</label>
                <input id="firstName" name="firstName" type="text" required style="width: 100%; padding: 0.75rem; margin-top: 0.4rem;">
            </div>
            <div>
                <label for="lastName">Last Name</label>
                <input id="lastName" name="lastName" type="text" required style="width: 100%; padding: 0.75rem; margin-top: 0.4rem;">
            </div>
            <div>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required style="width: 100%; padding: 0.75rem; margin-top: 0.4rem;">
            </div>
            <div>
                <label for="phone">Phone</label>
                <input id="phone" name="phone" type="tel" style="width: 100%; padding: 0.75rem; margin-top: 0.4rem;">
            </div>
            <div>
                <label for="role">Role</label>
                <select id="role" name="role" required style="width: 100%; padding: 0.75rem; margin-top: 0.4rem;">
                    <option value="">Select role</option>
                    <option value="Trainer">Trainer</option>
                    <option value="Manager">Manager</option>
                    <option value="Admin">Admin</option>
                    <option value="Receptionist">Receptionist</option>
                </select>
            </div>
            <div>
                <label for="specialization">Specialization</label>
                <input id="specialization" name="specialization" type="text" style="width: 100%; padding: 0.75rem; margin-top: 0.4rem;">
            </div>
            <div>
                <label for="salary">Salary</label>
                <input id="salary" name="salary" type="number" step="0.01" min="0" style="width: 100%; padding: 0.75rem; margin-top: 0.4rem;">
            </div>
            <div>
                <label for="photo">Photo</label>
                <input id="photo" name="photo" type="file" accept="image/*" style="width: 100%; padding: 0.75rem; margin-top: 0.4rem;">
            </div>
            <div style="grid-column: 1 / -1;">
                <button type="submit" class="btn-primary">Add Staff</button>
            </div>
        </form>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Photo</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Position</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${staff}">
                    <td><img th:if="${s.photoPath}" th:src="${s.photoPath}" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;" alt="photo"></td>
                    <td th:text="${s.firstName} + ' ' + ${s.lastName}">Name</td>
                    <td th:text="${s.email}">email</td>
                    <td th:text="${s.phone}">phone</td>
                    <td th:text="${s.role}">position</td>
                    <td><a th:href="@{/admin/staff/delete/{id}(id=${s.staffId})}" onclick="return confirm('Are you sure?');" class="btn-danger">Delete</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
