<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GymBoy</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="navbar">
    <a href="/" class="navbar-brand">💪 GymBoy (Admin)</a>
    <ul class="navbar-menu">
        <li><a href="/admin/dashboard">Dashboard</a></li>
        <li><a href="/admin/members">Members</a></li>
        <li><a href="/admin/checkin">Check-ins</a></li>
        <li><a href="/admin/staff">Staff</a></li>
        <li><a href="/admin/tiers">Tiers</a></li>
    </ul>
    <a class="btn-logout" href="/admin/logout">Logout</a>
</nav>

<div class="dashboard-container">
    <div class="dashboard-header">
        <h1 class="dashboard-title">Admin Dashboard</h1>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-number" th:text="${totalMembers}">0</div>
            <div class="stat-label">Total Members</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-number" th:text="${totalCheckIns}">0</div>
            <div class="stat-label">Total Check-ins</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🏷️</div>
            <div class="stat-number" th:text="${totalTiers}">0</div>
            <div class="stat-label">Membership Tiers</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">👨‍💼</div>
            <div class="stat-number" th:text="${totalStaff}">0</div>
            <div class="stat-label">Staff Members</div>
        </div>
    </div>

</div>

</body>
</html>
