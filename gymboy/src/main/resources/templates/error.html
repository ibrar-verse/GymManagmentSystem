<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Error</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;margin:20px}pre{background:#f6f6f6;padding:10px;border-radius:4px;overflow:auto}</style>
</head>
<body>
  <h1>Application Error</h1>
  <p><strong>Time:</strong> <span th:text="${timestamp}"></span></p>
  <p><strong>Path:</strong> <span th:text="${uri}"></span></p>
  <p><strong>Message:</strong> <span th:text="${message}"></span></p>
  <h2>Stacktrace</h2>
  <pre th:text="${stacktrace}"></pre>
</body>
</html>
