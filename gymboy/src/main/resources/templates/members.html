<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBoy - Members</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">💪 GymBoy</a>
        <ul class="navbar-menu">
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/members">Members</a></li>
            <li><a href="/check-in">Check-in</a></li>
            <li><a href="/staff">Staff</a></li>
            <li><a href="/facilities">Facilities</a></li>
        </ul>
        <button class="btn-logout" id="logoutBtn">Logout</button>
    </nav>

    <div class="page-container">
        <div class="page-header">
            <h1 class="page-title">Members Management</h1>
            <button class="btn-primary" id="addMemberBtn">+ Add Member</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search members by name or email...">
            <button class="btn-primary" id="searchBtn">Search</button>
        </div>

        <div class="table-container">
            <table id="membersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Membership Tier</th>
                        <th>Join Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="membersTableBody">
                    <tr><td colspan="7" style="text-align: center; color: var(--dark-gold);">Loading members...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Member Modal -->
    <div id="memberModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add New Member</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="memberForm">
                <div class="form-group">
                    <label for="memberName">Full Name</label>
                    <input type="text" id="memberName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="memberEmail">Email</label>
                    <input type="email" id="memberEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="memberPhone">Phone</label>
                    <input type="tel" id="memberPhone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="memberTier">Membership Tier</label>
                    <select id="memberTier" class="form-control" required>
                        <option value="">Select Tier</option>
                        <option value="BASIC">Basic</option>
                        <option value="STANDARD">Standard</option>
                        <option value="PREMIUM">Premium</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Save Member</button>
            </form>
        </div>
    </div>

    <script src="/js/members.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
