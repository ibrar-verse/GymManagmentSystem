<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBoy - Login</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">💪</div>
            <h1 class="login-title">GymBoy</h1>
            <p class="login-subtitle">Your Fitness Management Hub</p>
            
            <form id="loginForm">
                <div id="errorAlert" class="error-msg" style="display: none;"></div>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn-login">Login</button>
            </form>
            
            <div class="login-footer">
                <p>&copy; 2026 GymBoy. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
