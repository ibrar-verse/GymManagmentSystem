# ============================================
# APPLICATION SETTINGS (DEVELOPMENT)
# ============================================
spring.application.name=gymboy
server.port=${PORT:8080}

# ============================================
# H2 DATABASE (Development)
# ============================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================
# JPA/HIBERNATE SETTINGS
# ============================================
# create-drop = Drop tables and recreate on startup (good for dev)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# THYMELEAF SETTINGS
# ============================================
spring.thymeleaf.cache=false

# Include stacktraces in error responses (development only)
server.error.include-stacktrace=always

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO

# ============================================
# ADMIN CREDENTIALS (Change in production!)
# ============================================
admin.username=ibiverse
admin.password=Ibi@2024
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
