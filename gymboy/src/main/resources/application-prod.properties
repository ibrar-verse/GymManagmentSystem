# ============================================
# PRODUCTION SETTINGS FOR RAILWAY.APP
# ============================================
spring.application.name=gymboy

# Use environment variable for port (Railway sets PORT env var)
server.port=${PORT:8080}

# ============================================
# DATABASE - PostgreSQL for Production
# ============================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA/HIBERNATE SETTINGS
# ============================================
# validate = Only validate schema, don't modify
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ============================================
# THYMELEAF SETTINGS
# ============================================
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================
# SECURITY & LOGGING
# ============================================
logging.level.root=WARN
logging.level.com.ibiverse.gymboy=INFO

# ============================================
# ADMIN CREDENTIALS (Set via environment variables)
# ============================================
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}
